  <text x="838" y="463" text-anchor="middle" font-size="9" fill="#922b21">Guarda mediciones</text>

  <!-- SCADA → OPC-UA Server -->
  <path d="M970,256 L970,276" stroke="#e74c3c" stroke-width="1.5" fill="none"
