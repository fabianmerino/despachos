  <path d="M514,410 L530,428" stroke="#8e44ad" stroke-width="1.5" fill="none" marker-end="url(#arr)" />

  <!-- Channel → OutboxWorker -->
  <path d="M570,428 L596,410" stroke="#8e44ad" stroke-width="1.5" fill="none" marker-end="url(#arr)" />

  <!-- OutboxWorker → DbContext -->
  <path d="M620,482 L600,476" stroke="#ca6f1e" stroke-width="1.5" fill="none" marker-end="url(#arr)"
