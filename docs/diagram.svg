  <text x="715" y="317" text-anchor="middle" font-size="9" fill="#ca6f1e">MonitoredItem 1000ms</text>

  <!-- MySQL → SCADA (query) -->
  <!-- already covered by SCADA → MySQL arrow -->

  <!-- Operario icono nota -->
  <text x="970" y="445" text-anchor="middle" font-size="9" fill="#566573">ingresa NroTransporte</text>

</svg>