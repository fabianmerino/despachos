  <text x="245" y="333" text-anchor="middle" font-size="9" fill="#e74c3c">XML · X-API-Key</text>

  <!-- Nota: OutboxWorker apunta a SAP -->
  <path d="M562,373 C300,373 250,330 194,318" stroke="#e74c3c" stroke-width="1.8" fill="none"
