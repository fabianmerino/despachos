  <text x="464" y="291" text-anchor="middle" font-size="10" fill="#5d6d7e">Valida XML (Either)</text>
  <text x="464" y="305" text-anchor="middle" font-size="10" fill="#5d6d7e">Inserta / Cancela orden</text>

